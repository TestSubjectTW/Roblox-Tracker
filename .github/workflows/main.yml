name: Roblox Presence Tracker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  check-presence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python track.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update presence state"
          git push
